name: SCA Scan (Snyk)

on:
  workflow_call:
    inputs:
      service-name:
        description: Name of the service
        required: true
        type: string
      service-path:
        description: Path to the service directory
        required: false
        default: '.'
        type: string
      runtime:
        description: Runtime environment (node or python)
        required: false
        default: node
        type: string
    secrets:
      SNYK_TOKEN:
        required: true
    outputs:
      critical-found:
        description: Whether critical vulnerabilities were found
        value: ${{ jobs.sca.outputs.critical-found }}

jobs:
  sca:
    runs-on: ubuntu-latest
    outputs:
      critical-found: ${{ steps.check-critical.outputs.critical-found }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ inputs.service-path }}/package-lock.json

      - name: Install dependencies
        if: inputs.runtime == 'node'
        run: |
          cd ${{ inputs.service-path }}
          npm ci

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Install snyk-to-html
        run: npm install -g snyk-to-html

      - name: Run Snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          cd ${{ inputs.service-path }}
          snyk test --severity-threshold=high --json-file-output=snyk-report.json || true

      - name: Convert Snyk report to HTML
        run: |
          cd ${{ inputs.service-path }}
          snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Upload Snyk report
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report-${{ inputs.service-name }}
          path: ${{ inputs.service-path }}/snyk-report.html
          retention-days: 14

      - name: Check for critical vulnerabilities
        id: check-critical
        run: |
          cd ${{ inputs.service-path }}
          critical_count=$(jq '[.vulnerabilities[] | select(.severity == "critical")] | length' snyk-report.json || echo "0")
          high_count=$(jq '[.vulnerabilities[] | select(.severity == "high")] | length' snyk-report.json || echo "0")
          total=$((critical_count + high_count))
          if [ "$total" -gt 0 ]; then
            echo "critical-found=true" >> $GITHUB_OUTPUT
          else
            echo "critical-found=false" >> $GITHUB_OUTPUT
          fi
