name: Docker Build & Publish

on:
  workflow_call:
    inputs:
      service-name:
        description: Name of the service
        required: true
        type: string
      service-path:
        description: Path to the service directory
        required: false
        default: '.'
        type: string
      environment:
        description: Environment (develop or main)
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
    outputs:
      image-tag:
        description: Docker image tag
        value: ${{ jobs.publish.outputs.image-tag }}
      image-full:
        description: Full Docker image name with tag
        value: ${{ jobs.publish.outputs.image-full }}

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.set-tag.outputs.image-tag }}
      image-full: ${{ steps.set-tag.outputs.image-full }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate tag (main branch)
        if: inputs.environment == 'main'
        id: tag-main
        uses: mathieudutour/github-tag-action@v6.2
        with:
          tag_prefix: ${{ inputs.service-name }}-v
          dry_run: true
          default_bump: patch

      - name: Set image tag
        id: set-tag
        run: |
          if [ "${{ inputs.environment }}" == "main" ]; then
            TAG="${{ steps.tag-main.outputs.new_tag }}"
          else
            TAG="dev-${GITHUB_SHA}"
          fi
          echo "image-tag=$TAG" >> $GITHUB_OUTPUT
          echo "image-full=arunnsimon/${{ inputs.service-name }}:$TAG" >> $GITHUB_OUTPUT

      - name: Validate git tag
        if: inputs.environment == 'main'
        run: |
          TAG="${{ steps.set-tag.outputs.image-tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            CURRENT_COMMIT=$(git rev-parse HEAD)
            TAG_COMMIT=$(git rev-parse "$TAG")
            if [ "$CURRENT_COMMIT" != "$TAG_COMMIT" ]; then
              echo "Error: Tag $TAG exists but points to a different commit"
              exit 1
            fi
            echo "Tag $TAG already exists and points to current commit"
          else
            echo "Tag $TAG does not exist yet"
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Check if image exists
        id: check-image
        run: |
          IMAGE_FULL="${{ steps.set-tag.outputs.image-full }}"
          if docker manifest inspect "$IMAGE_FULL" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image $IMAGE_FULL already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image $IMAGE_FULL does not exist"
          fi

      - name: Build Docker image
        if: steps.check-image.outputs.exists == 'false'
        run: |
          cd ${{ inputs.service-path }}
          docker build -t ${{ steps.set-tag.outputs.image-full }} .

      - name: Push Docker image
        if: steps.check-image.outputs.exists == 'false'
        run: |
          docker push ${{ steps.set-tag.outputs.image-full }}

      - name: Create and push git tag
        if: inputs.environment == 'main' && steps.check-image.outputs.exists == 'false'
        run: |
          TAG="${{ steps.set-tag.outputs.image-tag }}"
          git tag "$TAG"
          git push origin "$TAG"
