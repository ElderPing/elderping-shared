name: Docker Build & Trivy Scan

on:
  workflow_call:
    inputs:
      service-name:
        description: Name of the service
        required: true
        type: string
      service-path:
        description: Path to the service directory
        required: false
        default: '.'
        type: string
    outputs:
      trivy-critical:
        description: Whether critical vulnerabilities were found
        value: ${{ jobs.build.outputs.trivy-critical }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      trivy-critical: ${{ steps.check-critical.outputs.trivy-critical }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd ${{ inputs.service-path }}
          docker build -t ${{ inputs.service-name }}:pr-test .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.service-name }}:pr-test
          format: table
          output: ${{ github.workspace }}/trivy-report-${{ inputs.service-name }}.txt
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ inputs.service-name }}
          path: ${{ github.workspace }}/trivy-report-${{ inputs.service-name }}.txt
          retention-days: 14

      - name: Check for critical vulnerabilities
        id: check-critical
        run: |
          if grep -qE "CRITICAL" ${{ github.workspace }}/trivy-report-${{ inputs.service-name }}.txt; then
            echo "trivy-critical=true" >> $GITHUB_OUTPUT
          else
            echo "trivy-critical=false" >> $GITHUB_OUTPUT
          fi
